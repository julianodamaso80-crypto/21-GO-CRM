<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo21go.png" />
    <link rel="apple-touch-icon" href="/logo21go.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="21Go! Proteção Patrimonial — CRM oficial. Gestão inteligente de associados, sinistros e operação." />
    <meta name="theme-color" content="#293C82" />
    <meta property="og:title" content="21Go! Proteção Patrimonial — CRM" />
    <meta property="og:description" content="Plataforma oficial 21Go! para gestão de proteção patrimonial." />
    <meta property="og:image" content="/logo21go.png" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>21Go! Proteção Patrimonial — CRM</title>
  </head>
  <body>
    <script>
      // Anti-FOUC: aplica tema antes do React montar
      (function () {
        try {
          var saved = localStorage.getItem('21go:theme');
          var theme = saved === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
